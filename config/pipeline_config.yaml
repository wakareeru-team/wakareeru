# Pipeline configuration file.
path:
  # If true, data_root is resolved under the repository root.
  # If false, data_root must be an absolute path, e.g. a mounted volume on RunPod.
  in_project_root: true
  data_root: "data"
  db_path: "commons_image_manifest.sqlite"
  raw_img_dir: "img"
  cache_dir: "cache"
  series_list_path: 'jr_east_freight_series.csv'
  series_commons_path: 'jr_east_freight_series_wiki_commons.csv'
  commons_review_path: 'review/commons_root_review.csv'
  manual_series_overrides_path: 'config/manual_series_overrides.csv'
  img_crawl_log_path: 'img_crawl_checkpoint.csv'
  llm_category_details_path: 'llm_category_details.csv'
  model_dir: "model"
  dataset_dir: "dataset"
  dataset_img_subdir: "images"
  'loss_analysis_data_dir': "loss_analysis"


# Crawler configuration

crawler:
  # Only active operators will be parsed and included in the final dataset. 
  # However, shared series with other operators will still be included 
  # even if the operator is not active.
  active_operators: ["JR東日本", "JR貨物"]
  full_series_crawling: true
  manifest_max_files_per_category: 50
  # 0 = only root category; positive numbers recurse into subcategories; -1 = unlimited.
  manifest_max_depth: 5
  # false = skip category file manifests already marked ok in the DB; true = overwrite crawl them.
  manifest_reprocess: false
  download_batch_size: 500
  # Keep this at 3 or lower for Wikimedia etiquette unless you have a stronger reason.
  download_workers: 1
  download_request_interval: 0.3
  # -1 = no cap; positive numbers download at most that many pending rows.
  download_total_limit: -1
  download_retry_failed: true
  
  download_max_retries: 3

  series_test_scope: ["E231系", "キハ40系", "EF510形", "DD51形", "C57形", "キハ141系","E233系", "E353系", "E657系", "E5系", "E6系", "EF64形", "E7系",'EF81形','E235系','キハ110系',
        '113系','485系','E217系','E257系']

# Img filtering configuration
image_filtering:
  siglip_model_name: "google/siglip2-base-patch16-512"
  siglip_db_load_batch_size: 1000
  siglip_batch_size: 16
  # -1 = no cap; positive numbers classify at most that many pending rows.
  siglip_total_limit: -1
  siglip_include_excluded: false
  siglip_threshold: 0.0
  siglip_log_path: null
# Metadata labeling configuration
metadata_labeling:
  openai_model_name: "gpt-5.4-mini"

llm_labeling:
  batch_size: 5
  max_retries: 3
  openai_model_name: "gpt-5.4-mini"
  web_search_enabled: true
  reasoning_effort: "low" # "none" | "low" | "high"，reasoning effort越高，模型在做判断时需要提供的理由越详细，能提升准确率但也会增加成本和响应时间。
  web_search_context_size: "low"
  web_search_tool_choice: "auto"


# GDINO bbox detection and post-processing configuration
gdino:
  model_name: IDEA-Research/grounding-dino-base
  box_threshold: 0.2
  text_threshold: 0.2
  nms_iou_threshold: 0.5
  batch_size: 4
  outer_batch_size: 80
  reprocess: false

crop_filtering:
  siglip_model_name: "google/siglip2-base-patch16-512"
  siglip_db_load_batch_size: 1000
  siglip_batch_size: 16
  siglip_total_limit: -1
  siglip_include_excluded: false
  siglip_threshold: 0.0
  siglip_log_path: "siglip_crop_checkpoint.csv"
  crop_pad_frac: 0.04
  crop_resize: null

fine_grain_series:
  rules_path: "config/manual_fine_grained_series.csv"

# Small Loss Trick噪声检测配置
noise_detection:
  # 用于noise detection训练的分类粒度。粒度越细，同series内视觉差异大的子型号
  # 不会互相被标为噪声，降低误判率。
  # 选项: "series" | "fine_grained_series" | "submodel"
  label_granularity: "fine_grained_series"
  hf_model_name: "facebook/dinov3-vits16-pretrain-lvd1689m"
  full_series: true
  series_test_scope: ["E231系", "キハ40系", "EF510形", "DD51形", "C57形", "キハ141系","E233系", "E353系", "E657系", "E5系", "E6系", "EF64形", "E7系",'EF81形','E235系','キハ110系',
        '113系','485系','E217系','E257系']
  

  crop_pad_frac: 0.04

  feature_extraction_batch_size: 16
  feature_cache_shard_size: 1024
  extration_workers: 4
  linear_head_train_batch_size: 32
  feature_cache_dir: "feature_cache"
  active_feature_cache_file: "latest"
  latest_feature_cache_file: "latest_feature_cache.txt"
  exclude_manual_noise: true
  manual_noise_labels: ["wrong_label", "out_of_label_space", "bad_crop"]
  exclude_predicted_noise: True
  predicted_noise_labels: ["wrong_label"]
  predicted_noise_min_prob: 0.8

loss_noise_tracking:
  embedding_feature_dim: 384
  learning_rate_high: 1e-3
  learning_rate_low: 1e-4
  lr_cycle_period: 10
  num_epochs: 30
  weight_decay: 1e-4
  active_loss_analysis_round: 'latest' # latest则读取最新结果，结果放在下面的txt指针里
  latest_loss_analysis_round_pointer: 'latest_loss_analysis_round.txt'
  loss_history_file_name: "demo_loss_history.csv"
  epoch_history_file_name: "demo_epoch_history.csv"
  model_checkpoint_prefix: "DINO_CLS_HEAD"

loss_analysis:
  loss_feature_file_name: "demo_loss_feature.csv"
  request_manual_review: true # 是否请求人工标记一部分数据，若是则直接跳出pipeline，并提示通过tool下review工具完成标记

logistic_regression_filter:
  minimum_reviewed_samples: 200
  # ============ LR相关配置 ============
  # 用于训练Logistic Regression的特征列。需要与loss_feature_file_name中提供的特征列匹配。
  feature_columns: ['mean', 'loss_tail_mean', 'loss_mean_pct_in_label',"error_rate", 'pred_label_rate']
  noise_positive_label: ['wrong_label']
  excluding_label: ['bad_crop', "out_of_label_space"]
  clean_label: "ok"
  test_ratio: 0.2
  fold_num: 4
  minimum_clean_recall: 0.93
  lr_C: 1.0
  solver: "lbfgs"
  class_weight: "balanced"
  max_iter: 1000
  model_name_prefix: "LR_pipeline_"
  model_pointer_path: "latest_lr_model.txt"

lr_prediction: # 对未知数据应用LR模型
  lr_model_path: 'latest' # 可以是具体的模型文件路径，或者"latest"表示使用最新训练好的模型
  reprocess: false #跳过已经有LR预测结果的数据
  prediction_file_name: "lr_predictions.csv"
  sync_to_db: true

crops_storage:
  format: 'flatten' #存储格式，可选'flatten'或'nested'。'flatten'表示将所有crop数据存储在同一层级的表中，'nested'表示按照series或submodel等层级结构存储。
  reprocess: false #为false则跳过已经存储crop的数据
  save_only_manual_reviewed: false # 仅保存人工审核过的crop数据到数据库，跳过未审核数据（包括自动审核和未审核数据）
  exclude_manual_noise: true
  manual_noise_labels: ["wrong_label", "out_of_label_space", "bad_crop"]
  exclude_predicted_noise: true
  noise_prediction_round: "latest"
  noise_prediction_file_name: "lr_predictions.csv"
  predicted_noise_labels: ["wrong_label"]
  predicted_noise_min_prob: 0.8
  crop_pad_frac: 0.04
  image_extension: "jpeg"
  metadata_file_name: "metadata.csv"
  labels_file_name: "labels.csv"
  label_column: "fine_grained_series"
  manual_correction_invalidate_metadata_columns: ["submodel", "bandai", "operator_en", "operator_jp", "special_formation", "special_livery"]
  manual_correction_refill_operator_columns: ["operator_en", "operator_jp"]
  manual_correction_refill_submodel_bandai_columns: ["submodel", "bandai"]
  image_metadata_columns: ['downloaded_path',"series", "fine_grained_series", "submodel", "bandai", "operator_en", "operator_jp", "special_formation", "special_livery", "power_type"]
  metadata_columns: ["image_path", "label_id", "label", "label_en", "manual_reviewed", "series", "fine_grained_series", "submodel", "bandai", "operator_en", "operator_jp", "special_formation", "special_livery", "power_type"]
  jpeg_quality: 95

trainer:
  backbone_model_name: "facebook/dinov3-vits16-pretrain-lvd1689m"
  freeze_backbone: true
  metadata_file_name: "metadata.csv"
  labels_file_name: "labels.csv"
  output_dir: "trainer_runs"
  image_path_column: "image_path"
  label_id_column: "label_id"
  batch_size: 32
  num_workers: 12
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  drop_last: true
  amp_enabled: true
  amp_dtype: "bfloat16"
  val_ratio: 0.2
  stratify_split: true
  seed: 42
  device: "auto"
  checkpoint_prefix: "linear_head"
  epoch_report_file_name: "epoch_report.csv"
  eval_report_file_name: "eval_report.json"
  prediction_file_name: "val_predictions.csv"
  phases:
    - name: "linear_head_warmup"
      train_mode: "linear_head"
      epochs: 3
      learning_rate: 1e-3
      weight_decay: 1e-4
      lora_r: 8
      lora_alpha: 16
      lora_dropout: 0.05
      lora_bias: "none"
      head_learning_rate: 1e-3
      lora_learning_rate: 1e-4
      early_stopping_enabled: false
      early_stopping_monitor: "val_macro_f1"
      early_stopping_mode: "max" # larger is better
      early_stopping_patience: 3
      early_stopping_min_delta: 0.0
    - name: "lora_attention"
      train_mode: "lora"
      epochs: 30
      weight_decay: 1e-4
      lora_r: 8
      lora_alpha: 16
      lora_dropout: 0.05
      lora_bias: "none"
      head_learning_rate: 1e-3
      lora_learning_rate: 1e-4
      early_stopping_enabled: true
      early_stopping_monitor: "val_macro_f1"
      early_stopping_mode: "max" # larger is better
      early_stopping_patience: 3
      early_stopping_min_delta: 0.0
  
